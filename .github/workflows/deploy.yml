name: Deploy to OCI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GONOSUMCHECK: github.com/ardp/coding-agent
      GONOSUMDB: github.com/ardp/coding-agent
      GOFLAGS: -mod=mod
      GOPRIVATE: github.com/ardp/coding-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./agent/... ./elicitation/... ./store/... ./web/... -count=1

  deploy:
    needs: test
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: |
          podman build --build-arg BUILD_TARGET=./cmd/server \
            -t gocoder:latest -f Containerfile .

      - name: Deploy container
        run: |
          # Stop and remove existing container
          podman stop gocoder-ardp 2>/dev/null || true
          podman rm gocoder-ardp 2>/dev/null || true

          podman run -d \
            --name gocoder-ardp \
            --restart=on-failure \
            --secret OPENROUTER_API_KEY,type=env \
            --secret OPENROUTER_MODEL,type=env \
            --secret OPENROUTER_BASE_URL,type=env \
            --secret OPENROUTER_MAX_TOKENS,type=env \
            --secret OPENROUTER_TIMEOUT,type=env \
            --secret ELICITATION_MODEL,type=env \
            -v ~/deploy/gocoder/projects/ardp/workspace:/workspace:Z \
            -p 8080:8080 \
            gocoder:latest gocoder-server

      - name: Verify health
        run: |
          sleep 3
          curl -sf http://localhost:8080/health || {
            podman logs gocoder-ardp
            exit 1
          }
          echo "Deploy complete"
